<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Job Capture</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">

    <header class="header">
      <span class="logo">&#128203;</span>
      <h1 class="title">Job Capture</h1>
      <button id="btn-settings-toggle" class="btn-icon" title="Settings">&#9881;</button>
    </header>

    <!-- Settings panel -->
    <div id="settings-panel" class="settings-panel hidden">
      <label class="field-label">Apps Script Web App URL</label>
      <input id="input-script-url" class="input-text" type="url"
        placeholder="https://script.google.com/macros/s/…/exec" autocomplete="off" />

      <label class="field-label">Secret Token</label>
      <input id="input-token" class="input-text" type="password"
        placeholder="Your secret token" autocomplete="off" />

      <label class="field-label">Google Sheet URL <span class="optional">(optional)</span></label>
      <input id="input-sheet-url" class="input-text" type="url"
        placeholder="https://docs.google.com/spreadsheets/d/…" autocomplete="off" />

      <label class="field-label">Sheet Tab Name</label>
      <input id="input-sheet-name" class="input-text" type="text"
        placeholder="Sheet1" autocomplete="off" />

      <button id="btn-save-settings" class="btn btn-settings">Save Settings</button>
      <div id="settings-status" class="inline-status hidden"></div>
    </div>

    <!-- Main -->
    <main class="main">
      <div class="field-group">
        <div class="field-label">Job Title</div>
        <div class="field-value" id="field-role">—</div>
      </div>
      <div class="field-group">
        <div class="field-label">Company</div>
        <div class="field-value" id="field-company">—</div>
      </div>
      <div class="field-group">
        <div class="field-label">URL</div>
        <div class="field-value field-url" id="field-url">—</div>
      </div>
      <div class="field-group">
        <div class="field-label">Timestamp</div>
        <div class="field-value" id="field-timestamp">—</div>
      </div>
      <div class="field-group">
        <div class="field-label">Job Description</div>
        <div class="field-value field-desc" id="field-description">—</div>
      </div>

      <div class="actions">
        <button id="btn-extract" class="btn btn-primary">Extract Job Info</button>
        <button id="btn-save" class="btn btn-success" disabled>Save to Sheet</button>
      </div>
      <div class="actions">
        <button id="btn-open-sheet" class="btn btn-secondary" disabled>Open Sheet ↗</button>
      </div>

      <div id="status" class="status hidden"></div>

      <!-- Alumni results -->
      <div id="alumni-section" class="alumni-section hidden">
        <div class="alumni-header">Duke Alumni at <span id="alumni-company-name"></span></div>
        <div id="alumni-list"></div>
      </div>
    </main>

  </div>
  <script src="popup.js"></script>
</body>
</html>
